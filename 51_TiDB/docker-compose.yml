version: "3.9"

services:

  pd:
    image: pingcap/pd:v8.5.5
    container_name: tidb-pd
    command:
      - --name=pd
      - --data-dir=/data/pd
      - --client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://pd:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd=http://pd:2380
    ports:
      - "2379:2379"
    volumes:
      - ./data/pd:/data
    networks:
      - tidb-network

  tikv:
    image: pingcap/tikv:v8.5.5
    container_name: tidb-tikv
    command:
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --data-dir=/data/tikv
      - --pd=pd:2379
    depends_on:
      - pd
    volumes:
      - ./data/tikv:/data
    networks:
      - tidb-network

  tidb:
    image: pingcap/tidb:v8.5.5
    container_name: tidb-server
    command:
      - --store=tikv
      - --path=pd:2379
      - --host=0.0.0.0
    ports:
      - "4000:4000"
      - "10080:10080"
    depends_on:
      - tikv
    networks:
      - tidb-network

networks:
  tidb-network: