version: "3.8"

services:
  arangodb:
    image: arangodb:3.12.2
    container_name: arangodb
    restart: unless-stopped
    ports:
      - "8529:8529"
    environment:
      ARANGO_ROOT_PASSWORD: password
      TZ: "Asia/Tokyo"
    volumes:
      - arangodb-data:/var/lib/arangodb3

volumes:
  arangodb-data:
