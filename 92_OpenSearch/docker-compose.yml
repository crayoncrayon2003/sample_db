services:
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: opensearch
    restart: always
    ports:
      - 9201:9200
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      TZ: "Asia/Tokyo"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

volumes:
  opensearch-data:
