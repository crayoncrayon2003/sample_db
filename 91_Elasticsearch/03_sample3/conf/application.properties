# === Debezium Server 設定 ===
# PostgreSQL の WAL (論理レプリケーション) を監視し、変更イベントを
# Redis Streams に publish する。アプリは一切関与しない。

# --- Sink: Redis Streams ---
debezium.sink.type=redis
debezium.sink.redis.address=redis:6379

# --- Source: PostgreSQL ---
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.database.hostname=postgres
debezium.source.database.port=5432
debezium.source.database.user=user
debezium.source.database.password=user
debezium.source.database.dbname=test
debezium.source.topic.prefix=cdc
debezium.source.plugin.name=pgoutput
debezium.source.slot.name=debezium
debezium.source.publication.name=dbz_publication
debezium.source.table.include.list=public.products

# オフセット (どこまで読んだか) も Redis に保存する (ファイル不要)
debezium.source.offset.storage=io.debezium.storage.redis.offset.RedisOffsetBackingStore
debezium.source.offset.storage.redis.address=redis:6379
debezium.source.offset.flush.interval.ms=1000

# --- メッセージ形式: スキーマ無しの素の JSON ---
debezium.format.key=json
debezium.format.key.schemas.enable=false
debezium.format.value=json
debezium.format.value.schemas.enable=false

quarkus.log.console.json=false
